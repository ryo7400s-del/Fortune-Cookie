kind = "web"
previewPath = "/"
title = "Omikuji"
version = "1.0.0"
id = "artifacts/omikuji"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19044

[services.development]
run = "pnpm --filter @workspace/omikuji run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omikuji", "run", "build" ]
publicDir = "artifacts/omikuji/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19044"
BASE_PATH = "/"
